<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>产品上新与下架会审仪表盘</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Product Change Review Board</p>
          <h1>产品上新与下架会审仪表盘</h1>
        </div>
      </header>

      <section class="control-strip" aria-label="筛选控制">
        <div class="segmented-control" id="typeFilter" role="group" aria-label="上下架筛选">
          <button class="active" type="button" data-type="all">全部</button>
          <button type="button" data-type="launch">上新</button>
          <button type="button" data-type="retire">下架</button>
        </div>
        <div class="toolbar-actions">
          <div class="legend">
            <span><i class="dot hot"></i>热厨</span>
            <span><i class="dot drink"></i>水吧</span>
            <span><i class="dot bake"></i>烘焙</span>
          </div>
          <button class="export-button" id="exportPdfButton" type="button">一键导出 PDF</button>
        </div>
      </section>

      <section class="department-grid" id="departmentGrid" aria-label="部门上下架列表"></section>

      <section class="review-section">
        <div class="section-heading">
          <p class="eyebrow">Review Decisions</p>
          <h2>会审部门意见</h2>
          <span class="save-state" id="saveState">内容自动保存</span>
        </div>
        <div class="review-grid" id="reviewGrid"></div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
